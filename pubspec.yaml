name: snake_classic
description: "Classic Nokia Snake reimagined with modern features"
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # AdMob
  google_mobile_ads: ^5.1.0

  # Local storage
  shared_preferences: ^2.2.3

  # Audio
  audioplayers: ^6.1.0

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  firebase_analytics: ^11.3.3
  google_sign_in: ^6.2.1

  # Connectivity
  connectivity_plus: ^6.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Haptics
  vibration: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.6
  share_plus: ^12.0.2
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  awesome_notifications: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/

  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#060B14"
    theme_color: "#060B14"
